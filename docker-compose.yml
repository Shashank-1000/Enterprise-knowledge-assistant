services:
  api:
    build: .
    container_name: enterprise-knowledge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    container_name: enterprise-knowledge-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/ask
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    command: streamlit run frontend/streamlit_app.py --server.address=0.0.0.0 --server.port=8501